name: Build markitdown binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: darwin-arm64
            python: "3.11"
          - os: macos-15
            platform: darwin-x64
            python: "3.11"
          - os: ubuntu-latest
            platform: linux-x64
            python: "3.11"
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            python: "3.11"
          - os: windows-latest
            platform: win-x64
            python: "3.11"

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install "./packages/markitdown[docx,xlsx,pptx,pdf]"

      - name: Find markitdown path
        id: find
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "entry=$(python -c 'import shutil; print(shutil.which(\"markitdown\"))')" >> $GITHUB_OUTPUT
          else
            echo "entry=$(which markitdown)" >> $GITHUB_OUTPUT
          fi

      - name: Build (onedir)
        run: |
          pyinstaller \
            --onedir \
            --name markitdown \
            --clean \
            --noconfirm \
            --exclude-module magika \
            --exclude-module onnxruntime \
            --exclude-module tensorflow \
            --exclude-module torch \
            "${{ steps.find.outputs.entry }}"

      - name: Test binary
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./dist/markitdown/markitdown.exe --version
          else
            ./dist/markitdown/markitdown --version
          fi

      - name: Package as tar.gz
        run: |
          cd dist
          tar -czf markitdown-${{ matrix.platform }}.tar.gz markitdown/
          ls -lh markitdown-${{ matrix.platform }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: markitdown-${{ matrix.platform }}
          path: dist/markitdown-${{ matrix.platform }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
