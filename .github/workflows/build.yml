name: Build markitdown binaries

on:
  push:
    tags:
      - 'v*'  # tag 推送时触发 (如 v0.1.6)
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14          # Apple Silicon runner
            platform: darwin-arm64
            python: "3.11"
          - os: macos-13          # Intel runner
            platform: darwin-x64
            python: "3.11"
          - os: ubuntu-latest     # Linux x64
            platform: linux-x64
            python: "3.11"
          # linux-arm64 需要 QEMU 或自托管 runner，暂不支持

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install "./packages/markitdown[docx,xlsx,pptx,pdf]"

      - name: Build (onedir)
        run: |
          pyinstaller \
            --onedir \
            --name markitdown \
            --clean \
            --noconfirm \
            --exclude-module magika \
            --exclude-module onnxruntime \
            --exclude-module tensorflow \
            --exclude-module torch \
            $(which markitdown)

      - name: Test binary
        run: |
          ./dist/markitdown/markitdown --version

      - name: Package as tar.gz
        run: |
          cd dist
          tar -czf markitdown-${{ matrix.platform }}.tar.gz markitdown/
          ls -lh markitdown-${{ matrix.platform }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: markitdown-${{ matrix.platform }}
          path: dist/markitdown-${{ matrix.platform }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
