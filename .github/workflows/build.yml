name: Build markitdown binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  OSS_BUCKET: crafto
  OSS_ENDPOINT: oss-cn-beijing.aliyuncs.com
  OSS_PREFIX: tools/tabpilot-tools

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: darwin-arm64
            python: "3.11"
          - os: macos-15
            platform: darwin-x64
            python: "3.11"
          - os: ubuntu-latest
            platform: linux-x64
            python: "3.11"
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            python: "3.11"
          - os: windows-latest
            platform: win-x64
            python: "3.11"

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install "./packages/markitdown[docx,xlsx,pptx,pdf]"

      - name: Build (onedir)
        run: |
          pyinstaller \
            --onedir \
            --name markitdown \
            --clean \
            --noconfirm \
            --exclude-module magika \
            --exclude-module onnxruntime \
            --exclude-module tensorflow \
            --exclude-module torch \
            entry.py

      - name: Test binary
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./dist/markitdown/markitdown.exe --version
          else
            ./dist/markitdown/markitdown --version
          fi

      - name: Package as tar.gz
        run: |
          cd dist
          # -h: follow symlinks (macOS PyInstaller 用符号链接)
          tar -chzf markitdown-${{ matrix.platform }}.tar.gz markitdown/
          ls -lh *.tar.gz

      - name: Upload to OSS
        env:
          PYTHONIOENCODING: utf-8
        run: |
          pip install -q oss2
          python3 -c "
          import oss2, os
          auth = oss2.Auth('${{ secrets.OSS_ACCESS_KEY_ID }}', '${{ secrets.OSS_ACCESS_KEY_SECRET }}')
          bucket = oss2.Bucket(auth, 'https://${{ env.OSS_ENDPOINT }}', '${{ env.OSS_BUCKET }}')
          local = 'dist/markitdown-${{ matrix.platform }}.tar.gz'
          oss_key = '${{ env.OSS_PREFIX }}/${{ matrix.platform }}/markitdown.tar.gz'
          bucket.put_object_from_file(oss_key, local)
          print(f'OK: {oss_key} uploaded')
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: markitdown-${{ matrix.platform }}
          path: dist/markitdown-${{ matrix.platform }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
